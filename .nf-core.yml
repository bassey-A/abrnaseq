repository_type: pipeline

nf_core_version: 3.5.2

lint:
  files_unchanged:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-abrnaseq_logo_light.png
    - docs/images/nf-core-abrnaseq_logo_light.png
    - docs/images/nf-core-abrnaseq_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .prettierignore
    - .prettierignore
    - .prettierignore
    - .github/CONTRIBUTING.md
  nextflow_config:
    - manifest.name
    - manifest.homePage
  nf_test_content: false
  multiqc_config:
    - report_comment
  files_exist:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-abrnaseq_logo_light.png
    - docs/images/nf-core-abrnaseq_logo_light.png
    - docs/images/nf-core-abrnaseq_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - assets/email_template.html
    - assets/sendmail_template.txt
    - assets/email_template.txt
    - .github/workflows/nf-test.yml
    - .github/actions/get-shards/action.yml
    - .github/actions/nf-test/action.yml
    - nf-test.config
    - tests/default.nf.test
    - conf/igenomes.config
    - conf/igenomes_ignored.config
  readme:
    - nextflow_badge
    - nfcore_template_badge

template:
  org: bassey-A
  name: abrnaseq
  description: A pipeline for RNA-seq data
  author: Afaq Qaisar & Bassey Alaga
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - github_badges
    - nf-test
    - igenomes
    - seqera_platform
    - codespaces
    - vscode
    - email
    - adaptivecard
    - slackreport
  is_nfcore: false
